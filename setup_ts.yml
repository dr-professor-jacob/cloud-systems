---
- name: Setup TeamSpeak 3 Server
  hosts: app_servers
  become: yes
  tasks:
    - name: Wait for apt lock to be released
      ansible.builtin.shell: "while fuser /var/lib/dpkg/lock >/dev/null 2>&1 || fuser /var/lib/apt/lists/lock >/dev/null 2>&1; do sleep 5; done"
      register: apt_lock_wait
      until: apt_lock_wait.rc == 0
      retries: 12 # Wait up to 60 seconds
      delay: 5
      changed_when: false

    - name: Update apt cache with retries
      ansible.builtin.apt:
        update_cache: yes
      retries: 5
      delay: 10
      register: apt_update
      until: apt_update is succeeded

    - name: Install Docker dependencies
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.gpg
        mode: '0644'
        force: yes

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ ansible_architecture | lower }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker
        update_cache: yes

    - name: Install Docker Engine
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present

    - name: Enable and start Docker
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: yes

    - name: Create TeamSpeak data directory
      file:
        path: /opt/teamspeak
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Deploy TeamSpeak docker-compose file
      copy:
        dest: /opt/teamspeak/docker-compose.yml
        owner: root
        group: root
        mode: '0644'
        content: |
          services:
            teamspeak:
              image: teamspeak:3.13.7
              container_name: teamspeak-server
              restart: unless-stopped
              ports:
                - "9987:9987/udp"
                - "10011:10011/tcp"
                - "10022:10022/tcp"
                - "30033:30033/tcp"
              environment:
                TS3SERVER_LICENSE: accept
              volumes:
                - ts3-data:/var/ts3server
          volumes:
            ts3-data:
              driver: local

    - name: Start TeamSpeak container
      ansible.builtin.command: docker compose up -d
      args:
        chdir: /opt/teamspeak

    - name: Wait for admin token to appear in logs
      ansible.builtin.command: docker compose logs teamspeak
      args:
        chdir: /opt/teamspeak
      register: ts_logs
      until: "'token=' in ts_logs.stdout"
      retries: 10
      delay: 5
      changed_when: no

    - name: Show admin token (save this!)
      ansible.builtin.debug:
        msg:
          - "====== TEAMSPEAK ADMIN TOKEN (SAVE THIS!) ======"
          - "{{ ts_logs.stdout | regex_search('token=([A-Za-z0-9+/]+)') }}"
          - "================================================"
