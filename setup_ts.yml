---
- name: Setup TeamSpeak 3 Server
  hosts: app_servers
  become: yes
  pre_tasks:
    - name: Wait for cloud-init to complete
      ansible.builtin.command: cloud-init status --wait
      changed_when: false

    - name: Wait for apt lock to be released
      ansible.builtin.shell: >
        while sudo fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do
          sleep 5;
        done
      changed_when: false
  tasks:
    - name: Install Docker
      ansible.builtin.include_role:
        name: docker

    - name: Create TeamSpeak data directory
      file:
        path: /opt/teamspeak
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Deploy TeamSpeak docker-compose file
      copy:
        dest: /opt/teamspeak/docker-compose.yml
        owner: root
        group: root
        mode: '0644'
        content: |
          services:
            teamspeak:
              image: ertagh/teamspeak3-server:arm64v8-latest-box
              container_name: teamspeak-server
              restart: unless-stopped
              ports:
                - "9987:9987/udp"
                - "10011:10011/tcp"
                - "10022:10022/tcp"
                - "30033:30033/tcp"
              environment:
                TS3SERVER_LICENSE: accept
              volumes:
                - ts3-data:/teamspeak/save
          volumes:
            ts3-data:
              driver: local

    - name: Start TeamSpeak container
      ansible.builtin.command: docker compose up -d
      args:
        chdir: /opt/teamspeak

    - name: Wait for TeamSpeak to be ready
      ansible.builtin.command: docker compose logs teamspeak
      args:
        chdir: /opt/teamspeak
      register: ts_logs
      until: "'listening on 0.0.0.0:9987' in ts_logs.stdout or 'token=' in ts_logs.stdout"
      retries: 12
      delay: 5
      changed_when: no

    - name: Show admin token (first boot only)
      ansible.builtin.debug:
        msg:
          - "====== TEAMSPEAK ADMIN TOKEN (SAVE THIS!) ======"
          - "{{ ts_logs.stdout | regex_search('token=([A-Za-z0-9+/=]+)') | default('Server already initialized - see note below') }}"
          - "================================================"
          - "If no token shown: server was already running. SSH in and run:"
          - "  docker exec teamspeak-server cat /teamspeak/save/query_ip_whitelist.txt"
          - "  or use ServerQuery on port 10011 to create a new token."
