---
- name: Setup TeamSpeak 3 Server
  hosts: app_servers
  become: yes
  tasks:
    - name: Install Docker dependencies
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: yes

    - name: Add Docker GPG key
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
          | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker apt repository
      shell: |
        echo \
          "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
          https://download.docker.com/linux/ubuntu \
          $(. /etc/os-release && echo "$VERSION_CODENAME") stable" \
          | tee /etc/apt/sources.list.d/docker.list > /dev/null
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Install Docker Engine
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Enable and start Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Create TeamSpeak data directory
      file:
        path: /opt/teamspeak
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Deploy TeamSpeak docker-compose file
      copy:
        dest: /opt/teamspeak/docker-compose.yml
        owner: root
        group: root
        mode: '0644'
        content: |
          services:
            teamspeak:
              image: ertagh/teamspeak3-server:arm64v8-latest-box
              container_name: teamspeak-server
              restart: unless-stopped
              ports:
                - "9987:9987/udp"
                - "10011:10011/tcp"
                - "10022:10022/tcp"
                - "30033:30033/tcp"
              volumes:
                - ts3-data:/teamspeak/save
              deploy:
                resources:
                  limits:
                    cpus: "1.0"
                    memory: 256M
          volumes:
            ts3-data:
              driver: local

    - name: Pull TeamSpeak Docker image
      command: docker compose pull
      args:
        chdir: /opt/teamspeak

    - name: Start TeamSpeak container
      command: docker compose up -d
      args:
        chdir: /opt/teamspeak

    - name: Wait for TeamSpeak to initialize
      pause:
        seconds: 10

    - name: Show admin token (save this!)
      command: docker compose logs teamspeak
      args:
        chdir: /opt/teamspeak
      register: ts_logs

    - name: Print admin token
      debug:
        msg: "{{ ts_logs.stdout_lines }}"
