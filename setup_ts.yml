---
- name: Setup TeamSpeak 3 Server
  hosts: app_servers
  become: yes
  pre_tasks:
    - name: Wait for cloud-init to complete
      ansible.builtin.command: cloud-init status --wait
      changed_when: false
  tasks:
    - name: Install Docker
      ansible.builtin.include_role:
        name: docker

    - name: Create TeamSpeak data directory
      file:
        path: /opt/teamspeak
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Deploy TeamSpeak docker-compose file
      copy:
        dest: /opt/teamspeak/docker-compose.yml
        owner: root
        group: root
        mode: '0644'
        content: |
          services:
            teamspeak:
              image: ertagh/teamspeak3-server:arm64v8-latest-box
              container_name: teamspeak-server
              restart: unless-stopped
              ports:
                - "9987:9987/udp"
                - "10011:10011/tcp"
                - "10022:10022/tcp"
                - "30033:30033/tcp"
              environment:
                TS3SERVER_LICENSE: accept
              volumes:
                - ts3-data:/teamspeak/save
          volumes:
            ts3-data:
              driver: local

    - name: Start TeamSpeak container
      ansible.builtin.command: docker compose up -d
      args:
        chdir: /opt/teamspeak

    - name: Wait for admin token to appear in logs
      ansible.builtin.command: docker compose logs teamspeak
      args:
        chdir: /opt/teamspeak
      register: ts_logs
      until: "'token=' in ts_logs.stdout"
      retries: 10
      delay: 5
      changed_when: no

    - name: Show admin token (save this!)
      ansible.builtin.debug:
        msg:
          - "====== TEAMSPEAK ADMIN TOKEN (SAVE THIS!) ======"
          - "{{ ts_logs.stdout | regex_search('token=([A-Za-z0-9+/]+)') }}"
          - "================================================"
