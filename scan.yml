---
# scan.yml — Run nmap against the app VM from Cloud Shell (external perspective)
# and push results to the webroot so the site can display them.
#
# Usage (from Cloud Shell):
#   ansible-playbook -i inventory.ini scan.yml
#
# Requires nmap on the control node (Cloud Shell):
#   sudo apt-get install -y nmap

- name: Run external nmap scan and publish results
  hosts: localhost
  gather_facts: false
  vars:
    target: "{{ hostvars['app_node']['ansible_host'] }}"
    out_file: /tmp/scan_raw.txt
    web_dest: /var/www/html/scan.json

  tasks:

    - name: Run nmap port + service + SSL + header scan
      shell: >
        nmap -sV -p 22,80,443,3306,8000,8002,8080
        --script ssl-enum-ciphers,http-security-headers
        --open
        -oN {{ out_file }}
        {{ target }}
      register: scan_result
      changed_when: false

    - name: Summarise open ports
      shell: grep -E "^[0-9]+/tcp" {{ out_file }} || echo "No open ports found"
      register: open_ports
      changed_when: false

    - name: Push results to app VM webroot
      delegate_to: app_node
      become: yes
      copy:
        content: |
          {{
            {
              "scanned_at": lookup('pipe', 'date -u +\"%Y-%m-%dT%H:%M:%SZ\"'),
              "target": target,
              "open_ports": open_ports.stdout_lines,
              "full_output": scan_result.stdout
            } | to_nice_json
          }}
        dest: "{{ web_dest }}"
        owner: www-data
        group: www-data
        mode: '0644'
