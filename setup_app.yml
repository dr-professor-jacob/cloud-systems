---
- name: Setup Web Server
  hosts: app_servers
  become: yes
  vars:
    certbot_email: "jr521816@ohio.edu"
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Nginx, Certbot, and security packages
      apt:
        name:
          - nginx
          - certbot
          - python3-certbot-nginx
          - python3-venv
          - fail2ban
          - unattended-upgrades
        state: present

    - name: Configure fail2ban SSH jail
      copy:
        dest: /etc/fail2ban/jail.d/sshd.conf
        content: |
          [sshd]
          enabled  = true
          port     = ssh
          maxretry = 5
          bantime  = 1h
          findtime = 10m
        owner: root
        group: root
        mode: '0644'
      notify: Restart fail2ban

    - name: Configure unattended security upgrades
      copy:
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        content: |
          Unattended-Upgrade::Allowed-Origins {
              "${distro_id}:${distro_codename}-security";
          };
          Unattended-Upgrade::AutoFixInterruptedDpkg "true";
          Unattended-Upgrade::MinimalSteps "true";
          Unattended-Upgrade::Remove-Unused-Dependencies "true";
          Unattended-Upgrade::Automatic-Reboot "false";
        owner: root
        group: root
        mode: '0644'

    - name: Enable automatic update schedule
      copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";
        owner: root
        group: root
        mode: '0644'

    - name: Ensure fail2ban is running and enabled
      service:
        name: fail2ban
        state: started
        enabled: yes

    - name: Harden SSH — post-quantum algorithms and access controls
      copy:
        dest: /etc/ssh/sshd_config.d/99-hardening.conf
        content: |
          # Post-quantum hybrid key exchange (sntrup761 + X25519, then classical fallback)
          KexAlgorithms sntrup761x25519-sha512@openssh.com,curve25519-sha256,curve25519-sha256@libssh.org
          # Ed25519 only for host keys and client public keys
          HostKeyAlgorithms ssh-ed25519
          PubkeyAcceptedAlgorithms ssh-ed25519
          # ETM (encrypt-then-MAC) MACs only
          MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com
          # AEAD ciphers only
          Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com
          # General hardening
          PermitRootLogin no
          LoginGraceTime 30
          MaxAuthTries 3
          MaxSessions 5
          AllowAgentForwarding no
          AllowTcpForwarding no
          X11Forwarding no
        owner: root
        group: root
        mode: '0600'
      notify: Restart SSH

    - name: Check if SSL certificate exists
      stat:
        path: /etc/letsencrypt/live/{{ app_domain }}/fullchain.pem
      register: cert_stat

    - name: Deploy HTTP-only Nginx configuration
      template:
        src: templates/nginx.conf.j2
        dest: /etc/nginx/nginx.conf
        owner: root
        group: root
        mode: '0644'
      when: not cert_stat.stat.exists
      notify: Validate and reload Nginx

    - name: Ensure Nginx is started and enabled
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Flush handlers before cert request
      meta: flush_handlers

    - name: Obtain SSL certificate
      command: >
        certbot certonly --webroot -w /var/www/html
        -d {{ app_domain }} --non-interactive --agree-tos
        -m {{ certbot_email }}
      args:
        creates: /etc/letsencrypt/live/{{ app_domain }}/fullchain.pem

    - name: Ensure webroot is owned by www-data
      file:
        path: /var/www/html
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Ensure activity.json exists and is owned by www-data
      copy:
        content: '{}'
        dest: /var/www/html/activity.json
        owner: www-data
        group: www-data
        mode: '0644'
        force: no

    - name: Ensure metrics.json exists and is owned by www-data
      copy:
        content: '{}'
        dest: /var/www/html/metrics.json
        owner: www-data
        group: www-data
        mode: '0644'
        force: no

    - name: Deploy landing page
      template:
        src: templates/index.html.j2
        dest: /var/www/html/index.html
        owner: www-data
        group: www-data
        mode: '0644'

    - name: Deploy session script
      copy:
        src: templates/session.js
        dest: /var/www/html/session.js
        owner: www-data
        group: www-data
        mode: '0644'

    - name: Deploy metrics script
      copy:
        src: templates/metrics.js
        dest: /var/www/html/metrics.js
        owner: www-data
        group: www-data
        mode: '0644'

    # MCP infrastructure server
    - name: Create MCP virtualenv
      command: python3 -m venv /opt/mcp-infra
      args:
        creates: /opt/mcp-infra/bin/python

    - name: Install MCP and dependencies in virtualenv
      pip:
        name:
          - mcp
          - uvicorn
          - starlette
        virtualenv: /opt/mcp-infra

    - name: Deploy MCP server script
      copy:
        src: templates/mcp_app.py
        dest: /opt/mcp-infra/mcp_app.py
        owner: root
        group: root
        mode: '0755'
      notify: Restart mcp-infra

    - name: Deploy MCP systemd service
      copy:
        src: templates/mcp_app.service
        dest: /etc/systemd/system/mcp-infra.service
        owner: root
        group: root
        mode: '0644'
      notify: Restart mcp-infra

    - name: Enable and start MCP service
      systemd:
        name: mcp-infra
        state: started
        enabled: yes
        daemon_reload: yes

    # Visitor ask service (Claude demo)
    - name: Fetch Anthropic API key from Key Vault
      command: >
        az keyvault secret show --vault-name cloud-v3-kv
        --name anthropic-api-key --query value --output tsv
      delegate_to: localhost
      become: no
      register: anthropic_key_result
      changed_when: false

    - name: Create ask-app virtualenv
      command: python3 -m venv /opt/ask-app
      args:
        creates: /opt/ask-app/bin/python

    - name: Install ask-app dependencies
      pip:
        name:
          - fastapi
          - uvicorn
          - anthropic
        virtualenv: /opt/ask-app

    - name: Deploy ask_app.py
      copy:
        src: templates/ask_app.py
        dest: /opt/ask-app/ask_app.py
        owner: root
        group: root
        mode: '0755'
      notify: Restart ask-app

    - name: Create ask-app rate data directory
      file:
        path: /opt/ask-app
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Deploy ask-app systemd service
      template:
        src: templates/ask_app.service
        dest: /etc/systemd/system/ask-app.service
        owner: root
        group: root
        mode: '0644'
      vars:
        anthropic_api_key: "{{ anthropic_key_result.stdout }}"
      notify: Restart ask-app

    - name: Enable and start ask-app service
      systemd:
        name: ask-app
        state: started
        enabled: yes
        daemon_reload: yes

    - name: Deploy ask.js
      copy:
        src: templates/ask.js
        dest: /var/www/html/ask.js
        owner: root
        group: root
        mode: '0644'

    - name: Deploy HTTPS Nginx configuration
      template:
        src: templates/nginx_ssl.conf.j2
        dest: /etc/nginx/nginx.conf
        owner: root
        group: root
        mode: '0644'
      notify: Validate and reload Nginx

  handlers:
    - name: Validate and reload Nginx
      command: nginx -t
      notify: Reload Nginx

    - name: Reload Nginx
      service:
        name: nginx
        state: reloaded

    - name: Restart fail2ban
      service:
        name: fail2ban
        state: restarted

    - name: Restart SSH
      service:
        name: ssh
        state: restarted

    - name: Restart mcp-infra
      systemd:
        name: mcp-infra
        state: restarted
        daemon_reload: yes

    - name: Restart ask-app
      systemd:
        name: ask-app
        state: restarted
        daemon_reload: yes
