---
- name: Setup Web Server
  hosts: app_servers
  become: yes
  vars:
    certbot_email: "jr521816@ohio.edu"
  pre_tasks:
    - name: Wait for cloud-init to complete
      ansible.builtin.command: cloud-init status --wait
      changed_when: false
  tasks:
    - name: Install Nginx, Certbot, and security packages
      ansible.builtin.apt:
        name:
          - nginx
          - certbot
          - python3-certbot-nginx
          - ssl-cert
        state: present
        update_cache: yes

    - name: Apply common security configuration
      ansible.builtin.include_role:
        name: common

    - name: Harden SSH access controls
      copy:
        dest: /etc/ssh/sshd_config.d/99-hardening.conf
        content: |
          PermitRootLogin no
          LoginGraceTime 30
          MaxAuthTries 3
          MaxSessions 5
          AllowAgentForwarding no
          X11Forwarding no
        owner: root
        group: root
        mode: '0600'
      notify: Restart SSH

    - name: Check if SSL certificate exists
      stat:
        path: /etc/letsencrypt/live/{{ app_domain }}/fullchain.pem
      register: cert_stat

    - name: Deploy HTTP-only Nginx configuration
      template:
        src: templates/nginx.conf.j2
        dest: /etc/nginx/nginx.conf
        owner: root
        group: root
        mode: '0644'
      when: not cert_stat.stat.exists
      notify: Validate and reload Nginx

    - name: Ensure Nginx is started and enabled
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Flush handlers before cert request
      meta: flush_handlers

    - name: Obtain SSL certificate
      command: >
        certbot certonly --webroot -w /var/www/html
        -d {{ app_domain }} --non-interactive --agree-tos
        -m {{ certbot_email }}
      args:
        creates: /etc/letsencrypt/live/{{ app_domain }}/fullchain.pem

    - name: Ensure webroot is owned by www-data
      file:
        path: /var/www/html
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Ensure activity.json exists and is owned by www-data
      copy:
        content: '{}'
        dest: /var/www/html/activity.json
        owner: www-data
        group: www-data
        mode: '0644'
        force: no

    - name: Ensure metrics.json exists and is owned by www-data
      copy:
        content: '{}'
        dest: /var/www/html/metrics.json
        owner: www-data
        group: www-data
        mode: '0644'
        force: no

    - name: Deploy landing page
      template:
        src: templates/index.html.j2
        dest: /var/www/html/index.html
        owner: www-data
        group: www-data
        mode: '0644'

    - name: Create projects/cloud directory
      file:
        path: /var/www/html/projects/cloud
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Deploy Azure IaC project page
      template:
        src: templates/projects/cloud/index.html.j2
        dest: /var/www/html/projects/cloud/index.html
        owner: www-data
        group: www-data
        mode: '0644'

    - name: Create about directory
      file:
        path: /var/www/html/about
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Deploy about page
      template:
        src: templates/about/index.html.j2
        dest: /var/www/html/about/index.html
        owner: www-data
        group: www-data
        mode: '0644'

    - name: Deploy resume PDF
      copy:
        src: templates/resume.pdf
        dest: /var/www/html/resume.pdf
        owner: www-data
        group: www-data
        mode: '0644'

    - name: Deploy session script
      copy:
        src: templates/session.js
        dest: /var/www/html/session.js
        owner: www-data
        group: www-data
        mode: '0644'

    - name: Deploy metrics script
      copy:
        src: templates/metrics.js
        dest: /var/www/html/metrics.js
        owner: www-data
        group: www-data
        mode: '0644'

    # MCP infrastructure server
    - name: Create MCP virtualenv
      command: python3 -m venv /opt/mcp-infra
      args:
        creates: /opt/mcp-infra/bin/python

    - name: Install MCP and dependencies in virtualenv
      pip:
        name:
          - mcp
          - uvicorn
          - starlette
        virtualenv: /opt/mcp-infra

    - name: Deploy MCP server script
      copy:
        src: templates/mcp_app.py
        dest: /opt/mcp-infra/mcp_app.py
        owner: root
        group: root
        mode: '0755'
      notify: Restart mcp-infra

    - name: Deploy MCP systemd service
      copy:
        src: templates/mcp_app.service
        dest: /etc/systemd/system/mcp-infra.service
        owner: root
        group: root
        mode: '0644'
      notify: Restart mcp-infra

    - name: Enable and start MCP service
      systemd:
        name: mcp-infra
        state: started
        enabled: yes
        daemon_reload: yes

    - name: Fetch MCP API key from Key Vault
      command: >
        az keyvault secret show --vault-name cloud-v3-kv
        --name mcp-api-key --query value --output tsv
      delegate_to: localhost
      become: no
      register: mcp_key_result
      changed_when: false

    # Visitor ask service (Claude demo)
    - name: Fetch Anthropic API key from Key Vault
      command: >
        az keyvault secret show --vault-name cloud-v3-kv
        --name anthropic-api-key --query value --output tsv
      delegate_to: localhost
      become: no
      register: anthropic_key_result
      changed_when: false

    - name: Create ask-app virtualenv
      command: python3 -m venv /opt/ask-app
      args:
        creates: /opt/ask-app/bin/python

    - name: Install ask-app dependencies
      pip:
        name:
          - fastapi
          - uvicorn
          - anthropic
        virtualenv: /opt/ask-app

    - name: Deploy ask_app.py
      copy:
        src: templates/ask_app.py
        dest: /opt/ask-app/ask_app.py
        owner: root
        group: root
        mode: '0755'
      notify: Restart ask-app

    - name: Create ask-app rate data directory
      file:
        path: /opt/ask-app
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Deploy ask-app systemd service
      template:
        src: templates/ask_app.service
        dest: /etc/systemd/system/ask-app.service
        owner: root
        group: root
        mode: '0644'
      vars:
        anthropic_api_key: "{{ anthropic_key_result.stdout }}"
      notify: Restart ask-app

    - name: Enable and start ask-app service
      systemd:
        name: ask-app
        state: started
        enabled: yes
        daemon_reload: yes

    - name: Deploy ask.js
      copy:
        src: templates/ask.js
        dest: /var/www/html/ask.js
        owner: root
        group: root
        mode: '0644'


    # Sentinel health monitor
    - name: Deploy sentinel health check script
      copy:
        src: templates/sentinel.sh
        dest: /usr/local/bin/sentinel.sh
        owner: root
        group: root
        mode: '0755'

    - name: Deploy sentinel systemd service
      copy:
        src: templates/sentinel.service
        dest: /etc/systemd/system/sentinel.service
        owner: root
        group: root
        mode: '0644'

    - name: Deploy sentinel systemd timer
      copy:
        src: templates/sentinel.timer
        dest: /etc/systemd/system/sentinel.timer
        owner: root
        group: root
        mode: '0644'

    - name: Enable and start sentinel timer
      systemd:
        name: sentinel.timer
        state: started
        enabled: yes
        daemon_reload: yes

    - name: Store nginx config checksum for sentinel
      shell: sha256sum /etc/nginx/nginx.conf | awk '{print $1}' > /etc/nginx/.sentinel_checksum
      changed_when: false

    - name: Ensure options-ssl-nginx.conf exists
      copy:
        dest: /etc/letsencrypt/options-ssl-nginx.conf
        content: |
          ssl_session_cache shared:le_nginx_SSL:10m;
          ssl_session_timeout 1440m;
          ssl_session_tickets off;
          ssl_protocols TLSv1.2 TLSv1.3;
          ssl_prefer_server_ciphers off;
          ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";
        force: no

    - name: Generate ssl-dhparams.pem if missing
      command: openssl dhparam -out /etc/letsencrypt/ssl-dhparams.pem 2048
      args:
        creates: /etc/letsencrypt/ssl-dhparams.pem


    - name: Deploy HTTPS Nginx configuration
      template:
        src: templates/nginx_ssl.conf.j2
        dest: /etc/nginx/nginx.conf
        owner: root
        group: root
        mode: '0644'
      vars:
        mcp_api_key: "{{ mcp_key_result.stdout }}"
      notify: Validate and reload Nginx

  handlers:
    - name: Validate and reload Nginx
      command: nginx -t
      notify: Reload Nginx

    - name: Reload Nginx
      service:
        name: nginx
        state: reloaded

    - name: Restart mcp-infra
      systemd:
        name: mcp-infra
        state: restarted
        daemon_reload: yes

    - name: Restart ask-app
      systemd:
        name: ask-app
        state: restarted
        daemon_reload: yes
