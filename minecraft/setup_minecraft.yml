---
- name: Configure FTB NeoTech Minecraft server
  hosts: minecraft
  become: yes

  vars_files:
    - group_vars/minecraft/secrets.yml

  roles:
    - docker

  tasks:
    - name: Create minecraft data directory
      file:
        path: /opt/minecraft/data
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Deploy docker-compose.yml
      copy:
        src: docker-compose.yml
        dest: /opt/minecraft/docker-compose.yml
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"

    - name: Write .env with RCON password
      copy:
        dest: /opt/minecraft/.env
        content: "RCON_PASSWORD={{ rcon_password }}\n"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"

    # ── rclone ──────────────────────────────────────────────────────────────

    - name: Install rclone
      shell: curl -fsSL https://rclone.org/install.sh | bash
      args:
        creates: /usr/bin/rclone

    - name: Create rclone config directory
      file:
        path: /root/.config/rclone
        state: directory
        mode: "0700"

    - name: Write rclone config (Azure Blob)
      copy:
        dest: /root/.config/rclone/rclone.conf
        content: |
          [azure-backup]
          type = azureblob
          account = {{ azure_storage_account }}
          key = {{ azure_storage_key }}
        mode: "0600"

    # ── Backup script + cron ─────────────────────────────────────────────────

    - name: Deploy backup script
      copy:
        src: backup.sh
        dest: /usr/local/bin/mc-backup
        mode: "0755"

    - name: Schedule daily backup at 04:00 UTC
      cron:
        name: mc-world-backup
        user: root
        hour: "4"
        minute: "0"
        job: /usr/local/bin/mc-backup

    # ── Management Scripts ──────────────────────────────────────────────────

    - name: Create scripts directory
      file:
        path: "/home/{{ ansible_user }}/scripts"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Deploy management scripts
      copy:
        src: "{{ item }}"
        dest: "/home/{{ ansible_user }}/{{ item }}"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"
      loop:
        - cathedral.py
        - workshop.py
        - terrain_blend.py
        - fixes.py
        - validate.py
        - rescue_shop.py

    # ── systemd service for docker-compose ───────────────────────────────────

    - name: Write minecraft systemd service
      copy:
        dest: /etc/systemd/system/minecraft.service
        content: |
          [Unit]
          Description=FTB NeoTech Minecraft Server
          After=docker.service
          Requires=docker.service

          [Service]
          WorkingDirectory=/opt/minecraft
          ExecStart=/usr/bin/docker compose up
          ExecStop=/usr/bin/docker compose down
          Restart=always
          RestartSec=10

          [Install]
          WantedBy=multi-user.target

    - name: Enable and start minecraft service
      systemd:
        name: minecraft
        daemon_reload: yes
        enabled: yes
        state: started

    # ── Automatic World Building ─────────────────────────────────────────────

    - name: Wait for RCON to be ready (port 25575)
      wait_for:
        port: 25575
        delay: 10
        timeout: 300

    - name: Run cathedral builder
      command: "python3 /home/{{ ansible_user }}/cathedral.py"
      become: no

    - name: Run workshop builder
      command: "python3 /home/{{ ansible_user }}/workshop.py"
      become: no

    - name: Run terrain blending and fix
      command: "python3 /home/{{ ansible_user }}/terrain_blend.py"
      become: no

    - name: Rescue buddy shop
      command: "python3 /home/{{ ansible_user }}/rescue_shop.py"
      become: no
