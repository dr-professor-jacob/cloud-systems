services:
  minecraft:
    image: itzg/minecraft-server:java21
    container_name: minecraft
    restart: unless-stopped
    ports:
      - "25565:25565"
      - "25575:25575"
    environment:
      EULA: "TRUE"
      TYPE: FTBA
      FTB_MODPACK_ID: "123"
      FTB_MODPACK_VERSION_ID: "100245"
      MEMORY: 6G
      ENABLE_RCON: "true"
      RCON_PORT: "25575"
      RCON_PASSWORD: "${RCON_PASSWORD}"
      MAX_PLAYERS: "20"
      DIFFICULTY: normal
      MOTD: "FTB NeoTech"
      # Server stays active even when empty (for AFK automation)
      STOP_SERVER_ANNOUNCE_DELAY: "60"
    volumes:
      - /opt/minecraft/data:/data
    tty: true
    stdin_open: true
