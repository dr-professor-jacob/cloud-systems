---
- name: Setup Database Server
  hosts: db_servers
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install MariaDB and security packages
      apt:
        name:
          - mariadb-server
          - python3-pymysql
          - python3-venv
          - fail2ban
          - unattended-upgrades
        state: present

    - name: Configure fail2ban SSH jail
      copy:
        dest: /etc/fail2ban/jail.d/sshd.conf
        content: |
          [sshd]
          enabled  = true
          port     = ssh
          maxretry = 5
          bantime  = 1h
          findtime = 10m
        owner: root
        group: root
        mode: '0644'
      notify: Restart fail2ban

    - name: Configure unattended security upgrades
      copy:
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        content: |
          Unattended-Upgrade::Allowed-Origins {
              "${distro_id}:${distro_codename}-security";
          };
          Unattended-Upgrade::AutoFixInterruptedDpkg "true";
          Unattended-Upgrade::MinimalSteps "true";
          Unattended-Upgrade::Remove-Unused-Dependencies "true";
          Unattended-Upgrade::Automatic-Reboot "false";
        owner: root
        group: root
        mode: '0644'

    - name: Enable automatic update schedule
      copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";
        owner: root
        group: root
        mode: '0644'

    - name: Ensure fail2ban is running and enabled
      service:
        name: fail2ban
        state: started
        enabled: yes

    - name: Harden SSH access controls
      copy:
        dest: /etc/ssh/sshd_config.d/99-hardening.conf
        content: |
          PermitRootLogin no
          LoginGraceTime 30
          MaxAuthTries 3
          MaxSessions 5
          AllowAgentForwarding no
          X11Forwarding no
        owner: root
        group: root
        mode: '0600'
      notify: Restart SSH

    - name: Ensure MariaDB is running and enabled
      service:
        name: mariadb
        state: started
        enabled: yes

    # Hardening
    - name: Remove anonymous users
      mysql_user:
        name: ''
        host_all: yes
        state: absent
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Remove test database
      mysql_db:
        name: test
        state: absent
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Disallow remote root login
      mysql_user:
        name: root
        host: '%'
        state: absent
        login_unix_socket: /var/run/mysqld/mysqld.sock

    # App database and user
    - name: Fetch DB password from Key Vault
      command: >
        az keyvault secret show --vault-name cloud-v3-kv
        --name db-password --query value --output tsv
      delegate_to: localhost
      become: no
      register: db_password_result
      changed_when: false

    - name: Create application database
      mysql_db:
        name: "{{ db_name }}"
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Create application user
      mysql_user:
        name: "{{ db_user }}"
        host: "{{ db_host_cidr }}"
        password: "{{ db_password_result.stdout }}"
        priv: "{{ db_name }}.*:ALL"
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock

    # Restrict bind address to DB subnet interface
    - name: Set bind-address to DB subnet IP
      copy:
        dest: /etc/mysql/mariadb.conf.d/99-bind.cnf
        content: |
          [mysqld]
          bind-address = {{ db_bind_address }}
        owner: root
        group: root
        mode: '0644'
      notify: Restart MariaDB

  handlers:
    - name: Restart MariaDB
      service:
        name: mariadb
        state: restarted

    - name: Restart fail2ban
      service:
        name: fail2ban
        state: restarted

    - name: Restart SSH
      service:
        name: ssh
        state: restarted

