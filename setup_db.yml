---
- name: Setup Database Server
  hosts: db_servers
  become: yes
  pre_tasks:
    - name: Wait for cloud-init to complete
      ansible.builtin.command: cloud-init status --wait
      changed_when: false
  tasks:
    - name: Install MariaDB and security packages
      ansible.builtin.apt:
        name:
          - mariadb-server
          - python3-pymysql
        state: present
        update_cache: yes

    - name: Apply common security configuration
      ansible.builtin.include_role:
        name: common

    - name: Harden SSH access controls
      copy:
        dest: /etc/ssh/sshd_config.d/99-hardening.conf
        content: |
          PermitRootLogin no
          LoginGraceTime 30
          MaxAuthTries 3
          MaxSessions 5
          AllowAgentForwarding no
          X11Forwarding no
        owner: root
        group: root
        mode: '0600'
      notify: Restart SSH

    - name: Ensure MariaDB is running and enabled
      service:
        name: mariadb
        state: started
        enabled: yes

    # Hardening
    - name: Remove anonymous users
      mysql_user:
        name: ''
        host_all: yes
        state: absent
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Remove test database
      mysql_db:
        name: test
        state: absent
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Disallow remote root login
      mysql_user:
        name: root
        host: '%'
        state: absent
        login_unix_socket: /var/run/mysqld/mysqld.sock

    # App database and user
    - name: Fetch DB password from Key Vault
      command: >
        az keyvault secret show --vault-name cloud-v3-kv
        --name db-password --query value --output tsv
      delegate_to: localhost
      become: no
      register: db_password_result
      changed_when: false

    - name: Create application database
      mysql_db:
        name: "{{ db_name }}"
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Create application user
      mysql_user:
        name: "{{ db_user }}"
        host: "{{ db_host_cidr }}"
        password: "{{ db_password_result.stdout }}"
        priv: "{{ db_name }}.*:ALL"
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock

    # Restrict bind address to DB subnet interface
    - name: Set bind-address to DB subnet IP
      copy:
        dest: /etc/mysql/mariadb.conf.d/99-bind.cnf
        content: |
          [mysqld]
          bind-address = {{ db_bind_address }}
        owner: root
        group: root
        mode: '0644'
      notify: Restart MariaDB

  handlers:
    - name: Restart MariaDB
      service:
        name: mariadb
        state: restarted
