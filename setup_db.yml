---
- name: Setup Database Server
  hosts: db_servers
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install MariaDB
      apt:
        name: mariadb-server
        state: present

    - name: Install python3-pymysql
      apt:
        name: python3-pymysql
        state: present

    - name: Ensure MariaDB is running and enabled
      service:
        name: mariadb
        state: started
        enabled: yes

    # Hardening
    - name: Remove anonymous users
      mysql_user:
        name: ''
        host_all: yes
        state: absent
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Remove test database
      mysql_db:
        name: test
        state: absent
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Disallow remote root login
      mysql_user:
        name: root
        host: '%'
        state: absent
        login_unix_socket: /var/run/mysqld/mysqld.sock

    # App database and user
    - name: Create application database
      mysql_db:
        name: "{{ db_name }}"
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Create application user
      mysql_user:
        name: "{{ db_user }}"
        host: "{{ db_host_cidr }}"
        password: "{{ db_password }}"
        priv: "{{ db_name }}.*:ALL"
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock

    # Restrict bind address to DB subnet interface
    - name: Set bind-address to DB subnet IP
      copy:
        dest: /etc/mysql/mariadb.conf.d/99-bind.cnf
        content: |
          [mysqld]
          bind-address = {{ db_bind_address }}
        owner: root
        group: root
        mode: '0644'
      notify: Restart MariaDB

  handlers:
    - name: Restart MariaDB
      service:
        name: mariadb
        state: restarted
